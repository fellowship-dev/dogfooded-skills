# GitHub Actions Workflow for Fly.io Deployment
# Place this file in: .github/workflows/deploy-flyio.yml

name: Deploy to Fly.io

on:
  push:
    branches:
      - main  # Deploy on push to main branch
  workflow_dispatch:  # Allow manual triggers

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    # Optional: Use GitHub Environments for deployment approvals
    # environment:
    #   name: production
    #   url: https://your-app.fly.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Optional: Decrypt environment variables if using encryption
      - name: Decrypt environment variables
        if: ${{ hashFiles('.env.enc.prod') != '' }}
        run: |
          openssl enc -aes-256-cbc -pbkdf2 -salt -d \
            -in .env.enc.prod -out .env -k ${{ secrets.ENV_PASS }}

      # Optional: Run tests before deployment
      # - name: Run tests
      #   run: |
      #     npm install
      #     npm test

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Optional: Health check after deployment
      - name: Health check
        run: |
          sleep 30  # Wait for deployment to stabilize
          curl --fail https://your-app.fly.dev/health || exit 1

      # Optional: Notify on deployment status
      # - name: Notify Slack on success
      #   if: success()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     payload: |
      #       {
      #         "text": "Deployment to Fly.io successful! 🚀"
      #       }

      # - name: Notify Slack on failure
      #   if: failure()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     payload: |
      #       {
      #         "text": "Deployment to Fly.io failed! ❌"
      #       }

