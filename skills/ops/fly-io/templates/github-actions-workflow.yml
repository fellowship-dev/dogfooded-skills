---

# Required GitHub Secrets
#
# Add these secrets to your GitHub repository:
# Settings > Secrets and variables > Actions > New repository secret
#
# 1. FLY_API_TOKEN
#    - Generate: flyctl auth token
#    - Description: Fly.io API token for deployments
#
# 2. ENV_PASS (if using encrypted environment files)
#    - Description: Password for decrypting .env files
#
# 3. SLACK_WEBHOOK_URL (optional, for notifications)
#    - Description: Slack webhook URL for deployment notifications
#
# For multiple environments, create separate tokens:
# - FLY_API_TOKEN_STAGING
# - FLY_API_TOKEN_PRODUCTION

---

# Deployment Workflow Notes
#
# 1. Remote-only builds:
#    - Uses --remote-only flag to build on Fly.io servers
#    - Faster for large applications
#    - Reduces GitHub Actions minutes usage
#
# 2. Health checks:
#    - Adjust sleep duration based on your app's startup time
#    - Update health check URL to match your endpoint
#    - Consider more sophisticated health check logic
#
# 3. Environment variables:
#    - Store production .env as .env.enc.prod in repository
#    - Decrypt during deployment using ENV_PASS secret
#    - Never commit unencrypted .env files
#
# 4. Testing before deployment:
#    - Uncomment test steps to run CI tests
#    - Consider adding integration tests
#    - Use GitHub Environments for approval gates
#
# 5. Notifications:
#    - Uncomment Slack notification steps
#    - Configure webhook URL in GitHub secrets
#    - Customize message format as needed
#
# 6. Multiple environments:
#    - Use separate Fly.io apps for staging/production
#    - Configure different secrets for each environment
#    - Use GitHub Environments for approval workflows
#
# 7. Rollback strategy:
#    - Keep previous deployment artifacts
#    - Document rollback procedures
#    - Consider automated rollback on failed health checks
